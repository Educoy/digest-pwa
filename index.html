<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Digest Matinal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<link rel="manifest" href="./manifest.json">
<!-- Meta tags de iOS para que se vea como app nativa al "Agregar a inicio". -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Digest Matinal">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='22'%20fill='%230b0d10'/%3E%3Ctext%20x='50'%20y='72'%20font-size='60'%20text-anchor='middle'%3E%F0%9F%93%B0%3C/text%3E%3C/svg%3E">

<style>
  /* ---------------------------------------------------------------
     Tema oscuro premium, glassmorphism, micro-animaciones.
     --------------------------------------------------------------- */
  :root {
    --bg: #07090d;
    --card: rgba(22,26,35,.82);
    --card-2: rgba(30,35,48,.78);
    --card-solid: #161a23;
    --texto: #eef0f4;
    --muted: #8d95a5;
    --linea: rgba(255,255,255,.07);
    --like: #34d399;
    --nope: #6b7280;
    --oro: #fbbf24;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--texto);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  /* Fondo animado sutil */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(99,102,241,.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(16,185,129,.08) 0%, transparent 70%),
      var(--bg);
    animation: bgShift 20s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(25deg); }
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 520px;
    margin: 0 auto;
    padding: max(env(safe-area-inset-top), 12px) 16px max(env(safe-area-inset-bottom), 12px);
  }

  /* ---------------- Header glassmorphism ---------------- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 4px;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--linea);
    border-radius: 16px;
  }
  header .info { flex: 1 1 auto; min-width: 0; }
  #fecha {
    font-size: 13px;
    color: var(--muted);
    text-transform: capitalize;
    letter-spacing: .2px;
  }
  #indicadores {
    font-size: 13px;
    margin-top: 3px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px 14px;
  }
  #indicadores b { font-weight: 600; color: var(--texto); }
  .icono {
    flex: 0 0 auto;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--linea);
    color: var(--texto);
    width: 42px; height: 42px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform .15s, background .2s;
  }
  .icono:hover { background: rgba(255,255,255,.1); }
  .icono:active { transform: scale(.9); }

  /* ---------------- Zona central ---------------- */
  main { flex: 1 1 auto; position: relative; min-height: 0; }
  .vista {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
  }
  [hidden] { display: none !important; }

  #progreso {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 10px 0 6px;
    letter-spacing: .4px;
  }

  /* ---------------- Mazo de cards glassmorphism ---------------- */
  #mazo { flex: 1 1 auto; position: relative; min-height: 0; }
  .carta {
    position: absolute; inset: 0;
    /* Tinte según el tema de la noticia (--c lo fija cada card en JS). */
    background: linear-gradient(165deg,
      color-mix(in srgb, var(--c, #3a4150) 22%, var(--card-2)),
      color-mix(in srgb, var(--c, #3a4150) 10%, var(--card)));
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid color-mix(in srgb, var(--c, #ffffff) 32%, var(--linea));
    border-radius: 24px;
    box-shadow:
      0 20px 50px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.05),
      0 0 34px color-mix(in srgb, var(--c, transparent) 16%, transparent);
    padding: 22px;
    display: flex; flex-direction: column;
    overflow: hidden;
    pointer-events: none;
    user-select: none; -webkit-user-select: none;
    will-change: transform;
  }
  .carta--activa { pointer-events: auto; touch-action: none; cursor: grab; }
  .carta--activa:active { cursor: grabbing; }
  .carta--estrella {
    border-color: rgba(251,191,36,.45);
    box-shadow:
      0 0 0 1px rgba(251,191,36,.3),
      0 0 40px rgba(251,191,36,.1),
      0 20px 50px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(251,191,36,.15);
    animation: starPulse 3s ease-in-out infinite;
  }
  @keyframes starPulse {
    0%, 100% { box-shadow: 0 0 0 1px rgba(251,191,36,.3), 0 0 30px rgba(251,191,36,.08), 0 20px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(251,191,36,.15); }
    50%      { box-shadow: 0 0 0 1px rgba(251,191,36,.5), 0 0 50px rgba(251,191,36,.15), 0 20px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(251,191,36,.25); }
  }

  .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 999px;
    background: color-mix(in srgb, var(--c) 18%, transparent);
    color: color-mix(in srgb, var(--c) 82%, white);
    border: 1px solid color-mix(in srgb, var(--c) 35%, transparent);
    backdrop-filter: blur(8px);
    letter-spacing: .2px;
  }
  .badge--estrella {
    background: rgba(251,191,36,.15);
    color: #fde68a;
    border-color: rgba(251,191,36,.4);
  }

  .bandera {
    position: absolute;
    top: 18px; right: 18px;
    font-size: 22px;
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: 4px 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    z-index: 2;
  }

  .carta--pildora {
    background: linear-gradient(145deg, #1e1b4b, #312e81);
    border-color: rgba(99,102,241,.3);
    text-align: center;
    justify-content: center;
    padding: 30px;
  }
  .carta--pildora .pildora-icono {
    font-size: 64px;
    margin-bottom: 20px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,.4));
  }
  .carta--pildora .titular {
    font-size: 24px; color: #a5b4fc; margin-bottom: 16px;
  }
  .carta--pildora .resumen {
    font-size: 16.5px; line-height: 1.6; color: #e0e7ff;
    flex: 0 1 auto;
  }

  .titular {
    font-size: clamp(20px, 5.6vw, 26px);
    line-height: 1.24;
    font-weight: 700;
    margin: 4px 0 14px;
    letter-spacing: -.2px;
  }
  .resumen {
    font-size: 15px;
    line-height: 1.55;
    color: #c4c9d4;
    margin: 0;
    overflow-y: auto;
    flex: 1 1 auto;
  }
  .pie {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--linea);
  }
  .fuente { font-size: 12.5px; color: var(--muted); }
  .relevancia {
    font-size: 11px; color: var(--muted); opacity: .7; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .rel-dots { display: flex; gap: 2px; }
  .rel-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted); opacity: .25;
  }
  .rel-dot--on { opacity: .9; background: var(--like); }

  /* Tags de contenido (2-3), tintados con el color del tema (--c). */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; flex: 0 0 auto; }
  .tag {
    font-size: 11.5px; font-weight: 600;
    padding: 3px 9px; border-radius: 8px;
    background: color-mix(in srgb, var(--c, #64748b) 16%, transparent);
    color: color-mix(in srgb, var(--c, #94a3b8) 72%, white);
    border: 1px solid color-mix(in srgb, var(--c, #64748b) 30%, transparent);
    letter-spacing: .2px;
  }
  .tag::before { content: "#"; opacity: .55; }

  /* Overlays de feedback durante el arrastre */
  .overlay {
    position: absolute; top: 22px;
    font-size: 20px; font-weight: 800; letter-spacing: 2px;
    padding: 10px 18px; border-radius: 14px;
    border: 2.5px solid; opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(6px);
    text-transform: uppercase;
  }
  .overlay--like {
    left: 20px; transform: rotate(-14deg);
    color: var(--like); border-color: var(--like);
    background: rgba(52,211,153,.08);
  }
  .overlay--nope {
    right: 20px; transform: rotate(14deg);
    color: var(--nope); border-color: var(--nope);
    background: rgba(107,114,128,.08);
  }

  #pistas {
    flex: 0 0 auto;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 12px 0 2px;
    opacity: .7;
    letter-spacing: .3px;
  }

  /* ---------------- Botones ---------------- */
  .boton {
    display: block; width: 100%;
    padding: 15px; border-radius: 14px;
    border: 1px solid var(--linea);
    background: rgba(255,255,255,.05);
    backdrop-filter: blur(12px);
    color: var(--texto);
    font-size: 15.5px; font-weight: 600;
    cursor: pointer;
    transition: transform .15s, background .2s;
  }
  .boton:hover { background: rgba(255,255,255,.08); }
  .boton:active { transform: scale(.97); }
  .boton--primario {
    background: linear-gradient(135deg, #34d399, #10b981);
    border-color: transparent;
    color: #022c22;
    box-shadow: 0 4px 20px rgba(16,185,129,.25);
  }
  .boton--primario:hover { box-shadow: 0 6px 28px rgba(16,185,129,.35); }

  /* ---------------- Vista final ---------------- */
  #vista-final { justify-content: center; gap: 16px; padding: 8px 4px; text-align: center; }
  #vista-final .titulo-final { font-size: 24px; font-weight: 700; letter-spacing: -.3px; }
  .pildora {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(16px);
    border: 1px solid var(--linea);
    border-radius: 20px;
    padding: 20px;
    font-size: 15px; line-height: 1.55;
    color: #c4c9d4;
    text-align: left;
  }
  .pildora .cabecera {
    display: block; font-weight: 700; color: var(--texto); margin-bottom: 8px;
    font-size: 15.5px;
  }

  /* ---------------- Vista guardados ---------------- */
  #vista-guardados { gap: 0; }
  .barra-vista {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0 12px;
  }
  .barra-vista h2 { font-size: 17px; margin: 0; flex: 1; font-weight: 700; }
  .lista { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; }
  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px 6px; border-bottom: 1px solid var(--linea);
    border-radius: 12px;
    transition: background .2s;
  }
  .item:hover { background: rgba(255,255,255,.03); }
  .item .cuerpo { flex: 1; min-width: 0; cursor: pointer; }
  .item .mini-badge { font-size: 11px; color: var(--muted); }
  .item .item-titular { font-size: 14.5px; font-weight: 600; margin: 3px 0; line-height: 1.3; }
  .item .item-fuente { font-size: 12px; color: var(--muted); }
  .item .borrar {
    flex: 0 0 auto; background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 2px 6px;
    transition: color .15s, transform .15s;
  }
  .item .borrar:hover { color: #ef4444; transform: scale(1.15); }
  .vacio { color: var(--muted); text-align: center; padding: 40px 12px; font-size: 14.5px; line-height: 1.5; }

  /* Transición suave entre vistas */
  .vista { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  @media (min-width: 600px) {
    .carta--activa { cursor: grab; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="info">
      <div id="fecha">—</div>
      <div id="indicadores"></div>
    </div>
    <button class="icono" id="btn-guardados" title="Guardados" aria-label="Ver guardados">🔖</button>
  </header>

  <main>
    <!-- Vista principal: el mazo -->
    <section class="vista" id="vista-mazo">
      <div id="progreso"></div>
      <div id="mazo"></div>
      <div id="pistas">← descartar&nbsp;&nbsp;·&nbsp;&nbsp;toca para leer&nbsp;&nbsp;·&nbsp;&nbsp;guardar →</div>
    </section>

    <!-- Vista final: píldora + acciones -->
    <section class="vista" id="vista-final" hidden>
      <div class="titulo-final">¡Listo por hoy! 🎉</div>
      <div class="pildora" id="pildora"></div>
      <button class="boton boton--primario" id="btn-ver-guardados">Ver guardados</button>
      <button class="boton" id="btn-repasar">Repasar de nuevo</button>
    </section>

    <!-- Vista guardados -->
    <section class="vista" id="vista-guardados" hidden>
      <div class="barra-vista">
        <button class="icono" id="btn-volver" aria-label="Volver">←</button>
        <h2>Guardados ❤️</h2>
      </div>
      <ul class="lista" id="lista-guardados"></ul>
    </section>

    <!-- Estado vacío / error -->
    <section class="vista" id="vista-vacio" hidden>
      <div class="vacio" id="vacio-msg"></div>
    </section>
  </main>
</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Config y helpers
// ---------------------------------------------------------------------------
const TEMAS = {
  ia:             { emoji: "🤖", nombre: "IA y tecnología",     color: "#3b82f6" },
  finanzas:       { emoji: "💹", nombre: "Finanzas y mercados", color: "#10b981" },
  emprendimiento: { emoji: "🚀", nombre: "Emprendimiento",      color: "#f59e0b" },
  ciencia:        { emoji: "🔬", nombre: "Ciencia",             color: "#a855f7" },
};
TEMAS.startups = TEMAS.emprendimiento;  // alias defensivo por si el JSON trae la clave interna
const TEMA_DEFECTO = { emoji: "📰", nombre: "General", color: "#64748b" };
const infoTema = (clave) => TEMAS[clave] || TEMA_DEFECTO;

const LS_KEY = "digest_guardados";
const DIAS_MAX = 30;                 // no conservar guardados de más de 30 días

const $ = (sel) => document.querySelector(sel);
const abrir = (url) => { if (url) window.open(url, "_blank", "noopener"); };

// Formato chileno de números: 40844.79 -> "40.844,79"
const fmt = (n) => Number(n).toLocaleString("es-CL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

let datos = null;        // contenido de digest.json
let fechaActual = "";    // datos.fecha, usada como clave de guardado
let cartas = [];         // [{ el, noticia, ovLike, ovNope }] en orden; cartas[0] = frente
let totalCartas = 0;     // total de cards del mazo (fijo; para el contador de progreso)

// ---------------------------------------------------------------------------
// Vistas (mostrar una a la vez)
// ---------------------------------------------------------------------------
function mostrarVista(id) {
  ["vista-mazo", "vista-final", "vista-guardados", "vista-vacio"].forEach((v) => {
    $("#" + v).hidden = (v !== id);
  });
}

// ---------------------------------------------------------------------------
// localStorage: guardados por id + fecha, podando > 30 días
// ---------------------------------------------------------------------------
function leerGuardados() {
  let arr;
  try { arr = JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch (e) { arr = []; }
  const limite = Date.now() - DIAS_MAX * 86400000;
  return arr.filter((g) => {
    const t = Date.parse(g.fecha);
    return isNaN(t) || t >= limite;
  });
}
function escribirGuardados(arr) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch (e) { /* almacenamiento lleno o bloqueado */ }
}
function guardarNoticia(n) {
  if (n.esPildora) return;
  const arr = leerGuardados();
  if (arr.some((g) => g.id === n.id && g.fecha === fechaActual)) return;  // ya estaba
  arr.push({
    id: n.id, fecha: fechaActual, tema: n.tema, titular_es: n.titular_es,
    resumen: n.resumen, url: n.url, fuente: n.fuente, guardado_en: Date.now(),
  });
  escribirGuardados(arr);
}
function eliminarGuardado(id, fecha) {
  escribirGuardados(leerGuardados().filter((g) => !(g.id === id && g.fecha === fecha)));
  renderGuardados();
}

// ---------------------------------------------------------------------------
// Header: fecha + indicadores
// ---------------------------------------------------------------------------
function renderHeader() {
  // Parseo manual de "YYYY-MM-DD" como fecha LOCAL para evitar corrimientos de zona.
  const [y, m, d] = fechaActual.split("-").map(Number);
  const fecha = new Date(y, (m || 1) - 1, d || 1);
  $("#fecha").textContent = fecha.toLocaleDateString("es-CL", { weekday: "long", day: "numeric", month: "long" });

  const ind = datos.indicadores || {};
  const partes = [];
  const linea = (emoji, nombre, obj) => {
    if (!obj) return;
    let txt = `${emoji} <b>${nombre}</b> $${fmt(obj.valor)}`;
    // Solo mostramos variación cuando hay dato comparable (no null).
    if (obj.variacion != null && obj.variacion_pct != null) {
      const v = obj.variacion;
      const flecha = v > 0 ? "🔺" : (v < 0 ? "🔻" : "▪️");
      const signo = v < 0 ? "−" : "+";
      txt += ` ${flecha} ${signo}${fmt(Math.abs(v))} (${signo}${fmt(Math.abs(obj.variacion_pct))}%)`;
    }
    partes.push(`<span>${txt}</span>`);
  };
  linea("💵", "Dólar", ind.dolar);
  linea("📈", "UF", ind.uf);
  $("#indicadores").innerHTML = partes.join("") || '<span style="color:var(--muted)">Sin indicadores hoy</span>';
}

// ---------------------------------------------------------------------------
// Construcción del mazo de cards
// ---------------------------------------------------------------------------
function crearCarta(item, tipo = "noticia", esEstrella = false) {
  const el = document.createElement("article");

  if (tipo === "pildora") {
    el.className = "carta carta--pildora";
    el.innerHTML = `
      <div class="overlay overlay--like">❤️ GENIAL</div>
      <div class="overlay overlay--nope">✕ PASAR</div>
      <div class="pildora-icono">🧠</div>
      <h2 class="titular">Píldora de IA</h2>
      <p class="resumen">${item}</p>
    `;
    const carta = { el, noticia: { url: null, esPildora: true, texto: item }, ovLike: el.querySelector(".overlay--like"), ovNope: el.querySelector(".overlay--nope") };
    el.addEventListener("touchstart", (e) => alIniciar(e.touches[0].clientX, e.touches[0].clientY, carta), { passive: true });
    el.addEventListener("mousedown", (e) => alIniciar(e.clientX, e.clientY, carta));
    return carta;
  }

  // Es una noticia normal
  const noticia = item;
  const t = infoTema(noticia.tema);
  el.className = "carta" + (esEstrella ? " carta--estrella" : "");
  el.style.setProperty("--c", t.color);   // tinte de la card según el tema

  const badgeEstrella = esEstrella ? `<span class="badge badge--estrella">⭐ Noticia del día</span>` : "";
  const bandera = noticia.bandera ? `<div class="bandera">${noticia.bandera}</div>` : `<div class="bandera">🌍</div>`;

  el.innerHTML = `
    <div class="overlay overlay--like">❤️ GUARDAR</div>
    <div class="overlay overlay--nope">✕ PASAR</div>
    ${bandera}
    <div class="badges">
      <span class="badge" style="--c:${t.color}">${t.emoji} ${escapar(t.nombre)}</span>
      ${badgeEstrella}
    </div>
    <h2 class="titular">${escapar(noticia.titular_es)}</h2>
    <p class="resumen">${escapar(noticia.resumen)}</p>
    ${renderTags(noticia.tags)}
    <div class="pie">
      <span class="fuente">${escapar(noticia.fuente || "")}</span>
      <span class="relevancia">${renderDots(Number(noticia.relevancia) || 5)}</span>
    </div>`;

  const carta = {
    el, noticia,
    ovLike: el.querySelector(".overlay--like"),
    ovNope: el.querySelector(".overlay--nope"),
  };
  // Escuchamos el inicio del gesto (touch y mouse) en cada card; el handler
  // ignora la card si no es la del frente.
  el.addEventListener("touchstart", (e) => alIniciar(e.touches[0].clientX, e.touches[0].clientY, carta), { passive: true });
  el.addEventListener("mousedown", (e) => alIniciar(e.clientX, e.clientY, carta));
  return carta;
}

function construirMazo() {
  const mazo = $("#mazo");
  mazo.innerHTML = "";
  cartas = [];
  
  const noticias = datos.noticias || [];
  const pildoras = datos.pildoras_ia || [];
  let pildoraIndex = 0;

  for (let i = 0; i < noticias.length; i++) {
    const n = noticias[i];
    const esEstrella = n.id === datos.noticia_del_dia;
    const c = crearCarta(n, "noticia", esEstrella);
    cartas.push(c);
    mazo.appendChild(c.el);
    
    // Intercalar píldora cada 10 noticias
    if ((i + 1) % 10 === 0 && pildoraIndex < pildoras.length) {
      const cPildora = crearCarta(pildoras[pildoraIndex], "pildora");
      cartas.push(cPildora);
      mazo.appendChild(cPildora.el);
      pildoraIndex++;
    }
  }

  if (!cartas.length) {          // estado vacío honesto
    mostrarVacio("No hay noticias en el digest de hoy. Vuelve mañana ☀️");
    return;
  }
  totalCartas = cartas.length;   // fijamos el total una vez (incluye píldoras intercaladas)
  actualizarPila();
  actualizarProgreso();
  mostrarVista("vista-mazo");
}

// Coloca cada card según su profundidad: la del frente centrada, las de atrás
// un poco más chicas y desplazadas (efecto "asomando detrás").
function actualizarPila() {
  cartas.forEach((c, i) => {
    c.el.classList.toggle("carta--activa", i === 0);
    c.el.style.zIndex = String(cartas.length - i);
    c.el.style.transition = "transform .3s ease, opacity .3s ease";
    if (i === 0)      { c.el.style.transform = ""; c.el.style.opacity = "1"; }
    else if (i === 1) { c.el.style.transform = "translateY(14px) scale(.955)"; c.el.style.opacity = "1"; }
    else if (i === 2) { c.el.style.transform = "translateY(28px) scale(.91)"; c.el.style.opacity = "1"; }
    else              { c.el.style.transform = "translateY(28px) scale(.91)"; c.el.style.opacity = "0"; }
  });
}

function actualizarProgreso() {
  const actual = totalCartas - cartas.length + 1;   // posición actual dentro del total fijo
  $("#progreso").textContent = cartas.length ? `${actual} / ${totalCartas}` : "";
}

// ---------------------------------------------------------------------------
// Gestos de swipe (touch + mouse comparten la misma lógica)
// ---------------------------------------------------------------------------
let arrastrando = false, x0 = 0, y0 = 0, dx = 0, dy = 0, cartaAct = null;

const umbralH = () => 0.35 * ($("#mazo").clientWidth || 320);  // ~35% del ancho
const UMBRAL_V = 110;                                          // px hacia arriba para "abrir"

function alIniciar(x, y, carta) {
  if (!cartas.length || carta !== cartas[0]) return;  // solo la card del frente
  arrastrando = true; cartaAct = carta; x0 = x; y0 = y; dx = 0; dy = 0;
  carta.el.style.transition = "none";
  // Listeners de movimiento/fin a nivel documento para seguir el dedo/mouse fuera de la card.
  document.addEventListener("touchmove", moverTouch, { passive: false });
  document.addEventListener("touchend", alSoltar);
  document.addEventListener("mousemove", moverMouse);
  document.addEventListener("mouseup", alSoltar);
}

function moverTouch(e) { e.preventDefault(); alMover(e.touches[0].clientX, e.touches[0].clientY); }
function moverMouse(e) { alMover(e.clientX, e.clientY); }

function alMover(x, y) {
  if (!arrastrando) return;
  dx = x - x0; dy = y - y0;
  cartaAct.el.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx * 0.05}deg)`;
  const t = umbralH();
  cartaAct.ovLike.style.opacity = Math.max(0, Math.min(1, dx / t));   // derecha = guardar
  cartaAct.ovNope.style.opacity = Math.max(0, Math.min(1, -dx / t));  // izquierda = pasar
}

function alSoltar() {
  document.removeEventListener("touchmove", moverTouch, { passive: false });
  document.removeEventListener("touchend", alSoltar);
  document.removeEventListener("mousemove", moverMouse);
  document.removeEventListener("mouseup", alSoltar);
  if (!arrastrando) return;
  arrastrando = false;
  const t = umbralH();
  const movido = Math.hypot(dx, dy);

  // Tap (casi sin movimiento) o swipe hacia arriba => abrir el artículo, sin descartar.
  if (movido < 10) { abrir(cartaAct.noticia.url); volverCentro(); return; }
  if (dy < -UMBRAL_V && Math.abs(dy) > Math.abs(dx)) { abrir(cartaAct.noticia.url); volverCentro(); return; }

  if (dx > t)  { salir(1); return; }    // derecha  => guardar
  if (dx < -t) { salir(-1); return; }   // izquierda => descartar
  volverCentro();                       // no pasó el umbral => vuelve al centro
}

function volverCentro() {
  const c = cartas[0];
  if (!c) return;
  c.el.style.transition = "transform .3s ease";
  c.el.style.transform = "";
  c.ovLike.style.opacity = "0";
  c.ovNope.style.opacity = "0";
}

// Anima la card fuera de pantalla y avanza a la siguiente.
function salir(dir) {
  const c = cartas[0];
  if (dir > 0 && !c.noticia.esPildora) guardarNoticia(c.noticia);   // swipe derecha = me gusta
  const off = (window.innerWidth || 400) * 1.4;
  c.el.style.transition = "transform .35s ease-out, opacity .35s ease-out";
  c.el.style.transform = `translate(${dir * off}px, ${dy}px) rotate(${dir * 18}deg)`;
  c.el.style.opacity = "0";
  cartas.shift();
  setTimeout(() => {
    c.el.remove();
    if (cartas.length) { actualizarPila(); actualizarProgreso(); }
    else mostrarFinal();
  }, 350);
}

// ---------------------------------------------------------------------------
// Vista final, guardados y vacío
// ---------------------------------------------------------------------------
function mostrarFinal() {
  const p = datos.pildora_ia || "";
  $("#pildora").innerHTML = `<span class="cabecera">🧠 Píldora de IA del día</span>${escapar(p)}`;
  $("#progreso").textContent = "";
  mostrarVista("vista-final");
}

function mostrarVacio(msg) {
  $("#vacio-msg").textContent = msg;
  mostrarVista("vista-vacio");
}

function renderGuardados() {
  const arr = leerGuardados().sort((a, b) => b.guardado_en - a.guardado_en);
  const ul = $("#lista-guardados");
  if (!arr.length) {
    ul.innerHTML = `<div class="vacio">Aún no guardas noticias.<br>Desliza una card a la derecha para guardarla ❤️</div>`;
    return;
  }
  ul.innerHTML = "";
  arr.forEach((g) => {
    const t = infoTema(g.tema);
    const li = document.createElement("li");
    li.className = "item";
    li.innerHTML = `
      <div class="cuerpo">
        <div class="mini-badge">${t.emoji} ${escapar(t.nombre)} · ${escapar(g.fecha)}</div>
        <div class="item-titular">${escapar(g.titular_es)}</div>
        <div class="item-fuente">${escapar(g.fuente || "")}</div>
      </div>
      <button class="borrar" aria-label="Eliminar">🗑️</button>`;
    li.querySelector(".cuerpo").addEventListener("click", () => abrir(g.url));
    li.querySelector(".borrar").addEventListener("click", () => eliminarGuardado(g.id, g.fecha));
    ul.appendChild(li);
  });
}

function mostrarGuardados() { renderGuardados(); mostrarVista("vista-guardados"); }

// Volver desde "guardados": al mazo si aún quedan cards, si no a la vista final/vacía.
function volverDeGuardados() {
  if (cartas.length) mostrarVista("vista-mazo");
  else if ((datos.noticias || []).length) mostrarVista("vista-final");
  else mostrarVista("vista-vacio");
}

// ---------------------------------------------------------------------------
// Utilidades y arranque
// ---------------------------------------------------------------------------
function escapar(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// Renderiza relevancia como puntos visuales (● llenos / ○ vacíos)
function renderDots(n) {
  let html = '<div class="rel-dots">';
  for (let i = 1; i <= 10; i++) html += `<span class="rel-dot${i <= n ? ' rel-dot--on' : ''}"></span>`;
  return html + '</div>' + `<span>${n}/10</span>`;
}

// Renderiza 2-3 tags de contenido (vienen de Gemini en digest.json). Si no hay, no muestra nada.
function renderTags(tags) {
  if (!Array.isArray(tags) || !tags.length) return "";
  const chips = tags.slice(0, 3).map((t) => `<span class="tag">${escapar(t)}</span>`).join("");
  return `<div class="tags">${chips}</div>`;
}

function iniciar(json) {
  datos = json;
  fechaActual = json.fecha || "";
  renderHeader();
  construirMazo();
}

// Botones
$("#btn-guardados").addEventListener("click", mostrarGuardados);
$("#btn-ver-guardados").addEventListener("click", mostrarGuardados);
$("#btn-volver").addEventListener("click", volverDeGuardados);
$("#btn-repasar").addEventListener("click", construirMazo);

// Carga del JSON (sin caché: no hay service worker, siempre lo más fresco).
fetch("./digest.json", { cache: "no-store" })
  .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(iniciar)
  .catch(() => {
    fechaActual = "";
    $("#fecha").textContent = "—";
    mostrarVacio("No pude cargar el digest de hoy (revisa que digest.json esté disponible).");
  });
</script>
